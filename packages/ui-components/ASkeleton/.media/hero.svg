<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 540" width="1640" height="540" role="img" aria-label="ASkeleton — the real profile card on the left transforms into its shimmering skeleton replica on the right, pixel-aligned to the same layout">
  <defs>
    <!-- Backdrop — same purple family as ATelInput hero. -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#3b1f5e"/>
      <stop offset="55%" stop-color="#27143f"/>
      <stop offset="100%" stop-color="#0d0517"/>
    </radialGradient>

    <linearGradient id="bgFlat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1126"/>
      <stop offset="100%" stop-color="#0e0717"/>
    </linearGradient>

    <!-- Skeleton bar gradient — left-to-right shimmer. -->
    <linearGradient id="shimmer" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3a4458"/>
      <stop offset="50%" stop-color="#6b7790"/>
      <stop offset="100%" stop-color="#3a4458"/>
    </linearGradient>

    <linearGradient id="shimmerLight" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4b5570"/>
      <stop offset="50%" stop-color="#7d89a4"/>
      <stop offset="100%" stop-color="#4b5570"/>
    </linearGradient>

    <!-- Soft card shadow. -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="22"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow tip. -->
    <marker id="arrowTip" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background. -->
  <rect width="1640" height="540" fill="url(#bg)"/>

  <!-- Tag rail at top. -->
  <g transform="translate(0, 36)">
    <text x="820" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#a78bfa" text-anchor="middle" letter-spacing="0.18em" font-weight="600">@ALIKHALILLL/A-SKELETON</text>
    <text x="820" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#e9e5f8" text-anchor="middle" font-weight="500">a self-generating skeleton loader for Vue 3 / Nuxt 3+</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEFT CARD — real content                                      -->
  <!-- ============================================================ -->
  <g transform="translate(130, 130)" filter="url(#cardShadow)">
    <rect width="540" height="340" rx="22" fill="url(#bgFlat)" stroke="#2c2240" stroke-width="1.5"/>

    <!-- Badge -->
    <rect x="36" y="36" width="170" height="34" rx="17" fill="#10b981" fill-opacity="0.16" stroke="#10b981" stroke-opacity="0.40" stroke-width="1"/>
    <text x="121" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="0.10em">RECOMMENDED</text>

    <!-- Avatar -->
    <circle cx="72" cy="138" r="36" fill="#7c3aed"/>
    <text x="72" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">MH</text>

    <!-- Name -->
    <text x="128" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#f4f3f8">Maya Hartman</text>
    <!-- Role -->
    <text x="128" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#8b85a0" letter-spacing="0.08em">SENIOR PLATFORM ENGINEER</text>

    <!-- Description (multiple <text> elements with absolute y — no <tspan dy>) -->
    <text x="36" y="208" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#bdb8d0">Builds developer tools and component libraries.</text>
    <text x="36" y="232" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#bdb8d0">Currently exploring runtime DOM introspection for</text>
    <text x="36" y="256" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#bdb8d0">self-generating skeleton loaders.</text>

    <!-- Button -->
    <rect x="36" y="286" width="200" height="44" rx="12" fill="#10b981"/>
    <text x="136" y="314" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">View profile</text>
  </g>

  <!-- Caption under left card -->
  <text x="400" y="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#8b85a0" text-anchor="middle">
    <tspan font-weight="700" fill="#e9e5f8">&lt;ASkeleton :loading=&quot;false&quot;&gt;</tspan><tspan>  ·  real content</tspan>
  </text>

  <!-- ============================================================ -->
  <!-- TRANSFORMATION ARROW                                          -->
  <!-- ============================================================ -->
  <g transform="translate(720, 300)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowTip)"/>
    <text x="100" y="-18" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#c4b5fd" text-anchor="middle">capture</text>
    <text x="100" y="32" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#c4b5fd" text-anchor="middle">replay</text>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT CARD — skeleton replica                                 -->
  <!-- ============================================================ -->
  <g transform="translate(970, 130)" filter="url(#cardShadow)">
    <rect width="540" height="340" rx="22" fill="url(#bgFlat)" stroke="#2c2240" stroke-width="1.5"/>

    <!-- Badge skeleton (pill) -->
    <rect x="36" y="36" width="170" height="34" rx="17" fill="url(#shimmer)" opacity="0.95"/>

    <!-- Avatar skeleton (circle) -->
    <circle cx="72" cy="138" r="36" fill="url(#shimmer)" opacity="0.95"/>

    <!-- Name bar -->
    <rect x="128" y="115" width="220" height="22" rx="4" fill="url(#shimmerLight)" opacity="0.95"/>
    <!-- Role bar -->
    <rect x="128" y="146" width="260" height="12" rx="3" fill="url(#shimmer)" opacity="0.7"/>

    <!-- Paragraph bars -->
    <rect x="36" y="196" width="468" height="14" rx="3" fill="url(#shimmer)" opacity="0.85"/>
    <rect x="36" y="220" width="468" height="14" rx="3" fill="url(#shimmer)" opacity="0.85"/>
    <rect x="36" y="244" width="320" height="14" rx="3" fill="url(#shimmer)" opacity="0.85"/>

    <!-- Button skeleton -->
    <rect x="36" y="286" width="200" height="44" rx="12" fill="url(#shimmerLight)" opacity="0.95"/>
  </g>

  <!-- Caption under right card -->
  <text x="1240" y="500" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#8b85a0" text-anchor="middle">
    <tspan font-weight="700" fill="#e9e5f8">&lt;ASkeleton :loading=&quot;true&quot;&gt;</tspan><tspan>  ·  shimmer replica</tspan>
  </text>
</svg>
