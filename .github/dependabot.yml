version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      nuxt:
        patterns:
          - 'nuxt'
          - '@nuxt/*'
          - '@nuxtjs/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
      typescript:
        patterns:
          - 'typescript'
          - 'vue-tsc'
          - '@types/*'
      commitlint:
        patterns:
          - '@commitlint/*'
          - 'husky'
          - 'lint-staged'
      prettier:
        patterns:
          - 'prettier'
          - 'prettier-*'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
