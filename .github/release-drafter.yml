name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Fixes'
    labels: ['bug', 'fix']
  - title: '🧰 Maintenance'
    labels: ['chore', 'maintenance']
  - title: '📝 Docs'
    labels: ['documentation']
  - title: '📦 Dependencies'
    labels: ['dependencies']
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: 'bug'
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/'
  - label: 'chore'
    title:
      - '/^(chore|refactor|style|perf|test|build|ci)(\(.+\))?:/'
  - label: 'dependencies'
    title:
      - '/^chore\(deps\):/'
      - '/^chore\(ci\):/'
version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'chore', 'documentation', 'dependencies']
  default: patch
template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
